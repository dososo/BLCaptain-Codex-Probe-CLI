<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Skill quality inspection preview</title>
  <desc id="desc">A preview of the Skill and output quality inspection report generated by BLCaptain Codex Probe CLI.</desc>
  <rect width="1280" height="760" fill="#f7f3ee"/>
  <rect x="64" y="48" width="1152" height="664" rx="18" fill="#ffffff"/>
  <text x="104" y="104" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#111827">Codex Skill / 输出体检报告</text>
  <text x="104" y="136" font-family="Inter, Arial, sans-serif" font-size="16" fill="#6b7280">示例数据：examples/risky-skill.md · 本地脱敏 · 人工复核建议</text>

  <rect x="104" y="174" width="252" height="136" rx="14" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="132" y="214" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">risk_score</text>
  <text x="132" y="272" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="900" fill="#be123c">100</text>

  <rect x="388" y="174" width="360" height="136" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="416" y="214" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">已发现风险</text>
  <text x="416" y="260" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">AI 味、插件风险、敏感信息</text>
  <text x="416" y="288" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">包含跳过手机号、一键开挂、自动安装插件等表达</text>

  <rect x="780" y="174" width="368" height="136" rx="14" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="808" y="214" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">脱敏效果</text>
  <text x="808" y="260" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="700" fill="#166534">[REDACTED:OPENAI_KEY]</text>
  <text x="808" y="288" font-family="Inter, Arial, sans-serif" font-size="15" fill="#166534">报告不输出原始 API key</text>

  <text x="104" y="364" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#111827">命中项</text>

  <rect x="104" y="392" width="498" height="92" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="128" y="424" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#9a3412">AI_SMELL · medium · 0.74</text>
  <text x="128" y="452" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">“当然可以”“一站式保姆级”等模板化表达。</text>
  <text x="128" y="474" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9a3412">建议：改成具体事实、对象、动作和验收结果。 E-008</text>

  <rect x="650" y="392" width="498" height="92" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="674" y="424" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#b91c1c">PLUGIN_RISK · high · 0.90</text>
  <text x="674" y="452" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">自动安装插件、跳过手机号、一键开挂。</text>
  <text x="674" y="474" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b91c1c">建议：改为人工确认和合规替代路径。 E-007 R-005</text>

  <rect x="104" y="512" width="498" height="92" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="128" y="544" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#b91c1c">SECRET_RISK · high · 0.95</text>
  <text x="128" y="572" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">输入中包含已脱敏的敏感信息。</text>
  <text x="128" y="594" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b91c1c">建议：从源文件移除密钥、cookie 或 token。 R-005</text>

  <rect x="650" y="512" width="498" height="92" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="674" y="544" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#1d4ed8">MISSING_PRIVACY_BOUNDARY · medium · 0.78</text>
  <text x="674" y="572" font-family="Inter, Arial, sans-serif" font-size="16" fill="#374151">缺少隐私、安全和删除边界。</text>
  <text x="674" y="594" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1d4ed8">建议：补充本地文件和用户数据处理规则。 R-005</text>

  <text x="104" y="682" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6b7280">输出文件：examples/reports/skill-lint-report.md</text>
</svg>
