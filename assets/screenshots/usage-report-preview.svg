<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Task-level usage report preview</title>
  <desc id="desc">A preview of the task-level usage report generated by BLCaptain Codex Probe CLI.</desc>
  <rect width="1280" height="760" fill="#eef2f7"/>
  <rect x="64" y="48" width="1152" height="664" rx="18" fill="#ffffff"/>
  <text x="104" y="104" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Codex 任务级用量自查报告</text>
  <text x="104" y="136" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">示例数据：examples/status.txt · 预算：100000 tokens · 本地只读分析</text>

  <rect x="104" y="176" width="240" height="112" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="128" y="212" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">total_tokens</text>
  <text x="128" y="258" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1d4ed8">142,000</text>

  <rect x="372" y="176" width="240" height="112" rx="12" fill="#fef2f2" stroke="#fecaca"/>
  <text x="396" y="212" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">预算状态</text>
  <text x="396" y="258" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800" fill="#b91c1c">OVER_BUDGET</text>

  <rect x="640" y="176" width="240" height="112" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="664" y="212" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">quota_remaining</text>
  <text x="664" y="258" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#c2410c">12%</text>

  <rect x="908" y="176" width="240" height="112" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="932" y="212" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">核心建议</text>
  <text x="932" y="250" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#166534">先停再拆</text>

  <text x="104" y="342" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">风险与建议</text>

  <rect x="104" y="370" width="1044" height="76" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="128" y="402" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#be123c">OVER_BUDGET · high · 0.94</text>
  <text x="128" y="430" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">total_tokens=142000 超过 budget_tokens=100000。停止扩大上下文，拆分任务，复用缓存输入。</text>
  <text x="1002" y="414" font-family="Inter, Arial, sans-serif" font-size="14" fill="#be123c">E-011 E-012 E-013</text>

  <rect x="104" y="466" width="1044" height="76" rx="10" fill="#fffbeb" stroke="#fde68a"/>
  <text x="128" y="498" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#a16207">FAST_MODE_RISK · medium · 0.78</text>
  <text x="128" y="526" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">mode=fast。除非任务确实需要速度或高推理，否则优先普通模式或更小模型做初筛。</text>
  <text x="1032" y="510" font-family="Inter, Arial, sans-serif" font-size="14" fill="#a16207">E-013 R-002</text>

  <rect x="104" y="562" width="1044" height="76" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="128" y="594" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#b91c1c">STOP_RECOMMENDED · high · 0.90</text>
  <text x="128" y="622" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">quota_remaining=12.0，低于 quota_limit=100.0 的 15%。建议停止非必要任务。</text>
  <text x="1068" y="606" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b91c1c">E-011 E-012</text>

  <text x="104" y="682" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">输出文件：examples/reports/usage-report.md</text>
</svg>
