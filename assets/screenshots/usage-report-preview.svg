<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Task-level usage report decision card preview</title>
  <desc id="desc">A preview of the decision card in the task-level usage report generated by BLCaptain Codex Probe CLI.</desc>
  <rect width="1280" height="760" fill="#edf2f7"/>
  <rect x="64" y="48" width="1152" height="664" rx="18" fill="#ffffff"/>
  <text x="104" y="104" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">Codex 任务级用量自查报告</text>
  <text x="104" y="136" font-family="Inter, Arial, sans-serif" font-size="16" fill="#64748b">示例数据：Codex 桌面版 /status · 本地只读 · 决策卡片优先</text>

  <rect x="104" y="172" width="1044" height="180" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="128" y="208" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">决策卡片</text>
  <rect x="128" y="232" width="156" height="78" rx="10" fill="#fef2f2" stroke="#fecaca"/>
  <text x="152" y="260" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">建议动作</text>
  <text x="152" y="294" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#b91c1c">停止</text>

  <text x="324" y="252" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">为什么贵</text>
  <text x="324" y="282" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">142,047 tokens，且上下文只剩 45%。继续读大文件会放大成本。</text>
  <text x="324" y="318" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#334155">怎么降配</text>
  <text x="424" y="318" font-family="Inter, Arial, sans-serif" font-size="16" fill="#475569">开新会话，只带最终 README、目标仓库、最新 commit 和必要日志。</text>

  <rect x="104" y="384" width="242" height="112" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="128" y="420" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">context_remaining</text>
  <text x="128" y="466" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#1d4ed8">45%</text>

  <rect x="372" y="384" width="242" height="112" rx="12" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="396" y="420" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">5 小时额度</text>
  <text x="396" y="466" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#166534">94%</text>
  <text x="500" y="466" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">18:51 重置</text>

  <rect x="640" y="384" width="242" height="112" rx="12" fill="#fefce8" stroke="#fde68a"/>
  <text x="664" y="420" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">7 天额度</text>
  <text x="664" y="466" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800" fill="#a16207">72%</text>
  <text x="768" y="466" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">6月25日 重置</text>

  <rect x="908" y="384" width="240" height="112" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="932" y="420" font-family="Inter, Arial, sans-serif" font-size="15" fill="#475569">预算状态</text>
  <text x="932" y="466" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="800" fill="#c2410c">OVER_BUDGET</text>

  <text x="104" y="548" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="700" fill="#0f172a">风险与建议</text>

  <rect x="104" y="576" width="1044" height="76" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <text x="128" y="608" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#be123c">OVER_BUDGET · high · 0.94</text>
  <text x="128" y="636" font-family="Inter, Arial, sans-serif" font-size="16" fill="#334155">停止继续扩大上下文；拆分任务；优先复用缓存输入；下一轮降低推理强度。</text>
  <text x="1002" y="620" font-family="Inter, Arial, sans-serif" font-size="14" fill="#be123c">E-011 E-012 E-013</text>

  <text x="104" y="690" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">输出文件：examples/reports/usage-report.md · doctor 汇总：examples/reports/doctor/doctor-report.md</text>
</svg>
